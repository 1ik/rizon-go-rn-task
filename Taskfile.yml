version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Server tasks
  server:run:
    desc: Run the backend server
    cmds:
      - go run ./cmd/server

  server:build:
    desc: Build the backend server
    cmds:
      - go build -o bin/server ./cmd/server

  # Worker tasks
  worker:run:
    desc: Run the email worker
    cmds:
      - go run ./cmd/worker

  worker:build:
    desc: Build the email worker
    cmds:
      - go build -o bin/worker ./cmd/worker

  # Dependency tasks
  deps:tidy:
    desc: Tidy Go dependencies
    cmds:
      - go mod tidy

  deps:update:
    desc: Update Go dependencies
    cmds:
      - go get -u ./...
      - task deps:tidy

  # Docker dependencies tasks
  deps:up:
    desc: Start dependency services (PostgreSQL, Redis, RabbitMQ)
    cmds:
      - docker-compose -f docker-compose.deps.yml up -d

  deps:down:
    desc: Stop dependency services
    cmds:
      - docker-compose -f docker-compose.deps.yml down

  deps:clean:
    desc: Stop and remove dependency services and volumes
    cmds:
      - docker-compose -f docker-compose.deps.yml down -v

  # Migration tasks
  migrate:up:
    desc: Run all pending migrations
    cmds:
      - go run ./cmd/migration -command=up

  migrate:down:
    desc: Rollback the last migration
    cmds:
      - go run ./cmd/migration -command=down

  # Database tasks
  schema:
    desc: Show current PostgreSQL schema
    cmds:
      - ./tools/show-schema.sh

  # GraphQL tasks
  gql:gen:
    desc: Generate GraphQL types
    cmds:
      - $(go env GOPATH)/bin/gqlgen generate

  # React Native tasks
  rn:install:
    desc: Install React Native dependencies
    dir: cmd/clients/react-native-app
    cmds:
      - npm install

  rn:start:
    desc: Start React Native development server (Expo)
    dir: cmd/clients/react-native-app
    cmds:
      - npx expo start

  rn:ios:
    desc: Run React Native app on iOS simulator
    dir: cmd/clients/react-native-app
    cmds:
      - npx expo start --ios

  rn:android:
    desc: Run React Native app on Android emulator
    dir: cmd/clients/react-native-app
    cmds:
      - npx expo start --android

  rn:web:
    desc: Run React Native app in web browser
    dir: cmd/clients/react-native-app
    cmds:
      - npx expo start --web

  # Development tasks
  dev:
    desc: Run development server and worker
    cmds:
      - task: server:run
      - task: worker:run
