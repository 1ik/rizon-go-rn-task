version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Server tasks
  server:run:
    desc: Run the backend server
    cmds:
      - go run ./cmd/server

  server:build:
    desc: Build the backend server
    cmds:
      - go build -o bin/server ./cmd/server

  # Worker tasks
  worker:run:
    desc: Run the email worker
    cmds:
      - go run ./cmd/worker

  worker:build:
    desc: Build the email worker
    cmds:
      - go build -o bin/worker ./cmd/worker

  # Dependency tasks
  deps:tidy:
    desc: Tidy Go dependencies
    cmds:
      - go mod tidy

  deps:update:
    desc: Update Go dependencies
    cmds:
      - go get -u ./...
      - task deps:tidy

  # Docker dependencies tasks
  deps:up:
    desc: Start dependency services (PostgreSQL, Redis, RabbitMQ)
    cmds:
      - docker-compose -f docker-compose.deps.yml up -d

  deps:down:
    desc: Stop dependency services
    cmds:
      - docker-compose -f docker-compose.deps.yml down

  deps:clean:
    desc: Stop and remove dependency services and volumes
    cmds:
      - docker-compose -f docker-compose.deps.yml down -v

  # Migration tasks
  migrate:up:
    desc: Run all pending migrations
    cmds:
      - go run ./cmd/migration -command=up

  migrate:down:
    desc: Rollback the last migration
    cmds:
      - go run ./cmd/migration -command=down

  # Database tasks
  schema:
    desc: Show current PostgreSQL schema
    cmds:
      - ./tools/show-schema.sh

  db:dump:users:
    desc: Dump last 5 users (newest first) to terminal
    cmds:
      - ./tools/dump_users.sh

  db:dump:feedback:
    desc: Dump last 5 feedbacks (newest first) to terminal
    cmds:
      - ./tools/dump_feedback.sh

  # Mock generation (gomock)
  mocks:gen:
    desc: Generate gomock mocks for app dependencies
    cmds:
      - go run go.uber.org/mock/mockgen@latest -source=internal/repository/repository.go -destination=internal/mocks/repository_mock.go -package=mocks
      - go run go.uber.org/mock/mockgen@latest -source=internal/in_memory_storage/store.go -destination=internal/mocks/store_mock.go -package=mocks
      - go run go.uber.org/mock/mockgen@latest -source=internal/message_broker/message_broker.go -destination=internal/mocks/message_broker_mock.go -package=mocks

  # GraphQL tasks
  gql:gen:
    desc: Generate GraphQL types
    cmds:
      - $(go env GOPATH)/bin/gqlgen generate

  # React Native tasks (TypeScript app in rn-app)
  rn:install:
    desc: Install React Native dependencies
    dir: cmd/clients/rn-app
    cmds:
      - npm install

  rn:start:
    desc: Start React Native development server (Expo)
    dir: cmd/clients/rn-app
    cmds:
      - npx expo start

  rn:start:clear:
    desc: Start React Native dev server with cleared cache
    dir: cmd/clients/rn-app
    cmds:
      - npx expo start --clear

  rn:ios:
    desc: Run React Native app on iOS simulator (rebuilds native code)
    dir: cmd/clients/rn-app
    cmds:
      - npx expo run:ios

  rn:android:
    desc: Run React Native app on Android emulator (rebuilds native code)
    dir: cmd/clients/rn-app
    cmds:
      - npx expo run:android

  rn:web:
    desc: Run React Native app in web browser
    dir: cmd/clients/rn-app
    cmds:
      - npx expo start --web

  rn:codegen:
    desc: Generate GraphQL types and React hooks from endpoint
    dir: cmd/clients/rn-app
    cmds:
      - npm run codegen

  # Development tasks
  dev:
    desc: Run development server and worker
    cmds:
      - task: server:run
      - task: worker:run
